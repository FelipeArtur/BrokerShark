<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>BrokerShark</title>
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
  <link rel="stylesheet" href="/static/css/style.css" />
</head>
<body>

<header>
  <h1 class="brand">Broker<span>Shark</span></h1>

  <nav class="tabs">
    <button class="tab active" data-bank="">Todos</button>
    <button class="tab" data-bank="nubank">Nubank</button>
    <button class="tab" data-bank="inter">Inter</button>
  </nav>

  <div class="status">
    <span class="sse-dot" id="sse-dot"></span>
    <span id="last-updated">—</span>
  </div>
</header>

<div class="cards">
  <div class="card">
    <div class="card-label">Receitas do mês</div>
    <div class="card-value green" id="c-income">—</div>
    <div class="card-sub" id="c-month">—</div>
  </div>
  <div class="card">
    <div class="card-label">Gastos do mês</div>
    <div class="card-value red" id="c-expenses">—</div>
    <div class="card-sub" id="c-top-cat">—</div>
  </div>
  <div class="card">
    <div class="card-label">Saldo líquido</div>
    <div class="card-value" id="c-balance">—</div>
  </div>
  <div class="card">
    <div class="card-label">Reservas</div>
    <div class="card-value purple" id="c-reservas">—</div>
  </div>
</div>

<div class="main-grid">
  <div class="panel">
    <div class="panel-title">Evolução — últimos 6 meses</div>
    <div class="chart-wrap lg"><canvas id="chart-monthly"></canvas></div>
  </div>
  <div class="side-stack">
    <div class="panel">
      <div class="panel-title">Faturas abertas</div>
      <div id="faturas-list"></div>
    </div>
    <div class="panel">
      <div class="panel-title">Investimentos</div>
      <div class="chart-wrap md"><canvas id="chart-investments"></canvas></div>
    </div>
  </div>
</div>

<div class="bottom-grid">
  <div class="panel">
    <div class="panel-title">Gastos por categoria</div>
    <div class="chart-wrap lg"><canvas id="chart-categories"></canvas></div>
  </div>
  <div class="panel">
    <div class="panel-title">Saldo por conta</div>
    <div class="chart-wrap lg"><canvas id="chart-accounts"></canvas></div>
  </div>
</div>

<script src="/static/js/api.js"></script>
<script src="/static/js/charts.js"></script>
<script src="/static/js/main.js"></script>
</body>
</html>
